<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../css/admin-dashboard.css">
</head>

<body>

 <!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>

  <a href="#" class="active">Dashboard</a>
  <a href="#" onclick="goToSubmissions()">Submissions</a>
  <a href="#" onclick="logout()">Logout</a>
</div>
<!-- MAIN CONTENT -->
  <div class="main-content">

    <div class="header">
      <h1>Admin Dashboard</h1>
    </div>

  <!-- 🔥 STATS SECTION (FIXED LIKE SUBMISSION PAGE) -->
  <div class="stats">
    <div class="stat-card">
      <h3 id="totalAgents">0</h3>
      <p>Total Agents</p>
    </div>

    <div class="stat-card">
      <h3 id="approvedAgents">0</h3>
      <p>Approved</p>
    </div>

    <div class="stat-card">
      <h3 id="rejectedAgents">0</h3>
      <p>Rejected</p>
    </div>

    <div class="stat-card">
      <h3 id="pendingAgents">0</h3>
      <p>Pending</p>
    </div>
  </div>

  <!-- 🔥 FILTER SECTION (MATCH SUBMISSION) -->
  <div class="filters">
    <input type="text" id="searchEmail" placeholder="Search by email">

    <select id="statusFilter">
      <option value="">All</option>
      <option value="PENDING">Pending</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
    </select>

    <button onclick="applyFilters()">Apply</button>
  </div>

  <!-- AGENTS LIST -->
  <div id="agentsContainer" class="cards-container"></div>

  <!-- PAGINATION -->
  <div id="pagination"></div>

  <script src="../js/admin-dashboard.js"></script>
  <div id="toast" class="toast">
  <div id="toastMessage"></div>
  <div class="progress-bar"></div>
</div>

</body>
</html>
