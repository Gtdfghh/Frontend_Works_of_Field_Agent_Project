<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - AgentFlow</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/login.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="overlay">
      <h1>AgentFlow</h1>
      <p>Secure Field Agent Onboarding System</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <div class="form-container"> <!-- ✅ IMPORTANT -->

      <div class="form-box">

        <h1 class="title">Reset Password</h1>
        <p class="subtitle">Enter new password</p>

        <!-- NEW PASSWORD -->
        <div class="password-wrapper">
          <input type="password" id="newPassword" placeholder="New Password">
          <i class="fa-solid fa-eye-slash eye-icon" id="toggleNew"></i>
          <p id="passwordError" style="color:red; font-size:12px; display:none;"></p>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Confirm Password">
          <i class="fa-solid fa-eye-slash eye-icon" id="toggleConfirm"></i>
        </div>

        <button type="button" id="resetBtn">Reset Password</button>

      </div>

    </div>

  </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast">
  <div id="toastMessage"></div>
  <div class="progress-bar"></div>
</div>

<!-- LOADER -->
<div id="loader" class="loader">
  <div class="spinner"></div>
</div>

<!-- JS -->
<script src="../js/reset-password.js"></script>

</body>
</html>
