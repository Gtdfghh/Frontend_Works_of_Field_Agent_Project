<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - AgentFlow</title>

  <link rel="stylesheet" href="../css/forgot-password.css">
</head>

<body>

<div class="container">

  <!-- LEFT PANEL SAME AS LOGIN -->
  <div class="left-panel">
    <div class="overlay">
      <h1>AgentFlow</h1>
      <p>Secure Field Agent Onboarding System</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <div class="form-container">

      <div class="form-box">

        <h1 class="title">Forgot Password</h1>
        <p class="subtitle">Enter your email to reset password</p>

        <input type="email" id="email" placeholder="Email" required>

        <button type="button" id="sendBtn">Send Reset Link</button>

        <!-- Back to login -->
        <p class="register-text">
          Remember password?
          <a href="login.html" class="register-link">Login</a>
        </p>

      </div>

    </div>

  </div>

</div>

<script src="../js/forgot-password.js"></script>

<div id="toast" class="toast">
  <div id="toastMessage"></div>
  <div class="progress-bar"></div>
</div>
<div id="loader" class="loader">
  <div class="spinner"></div>
</div>
</body>
</html>
