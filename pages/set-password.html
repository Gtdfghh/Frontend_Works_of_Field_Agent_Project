<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set Password</title>
  <link rel="stylesheet" href="../css/set-password.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h2>Set Your Password</h2>
    <p>Create a secure password for your account</p>

    <form id="setPasswordForm">

      <input type="password" id="oldPassword" placeholder="Old Password" required="">

      <div class="password-wrapper">
  <input type="password" id="newPassword" placeholder="New Password" required="">
  <i class="fa-solid fa-eye eye-icon" id="toggleEye"></i>
</div>

<p id="passwordError" class="error-text"></p>

      <input type="password" id="confirmPassword" placeholder="Confirm Password" required="">

      <button type="submit">Update Password</button>

    </form>

  </div>

</div>

<script src="../js/set-password.js"></script>
<div id="toast" class="toast">
  <div id="toastMessage"></div>
  <div class="progress-bar"></div>
  <div id="loader" class="loader">
  <div class="spinner"></div>
</div>


</body>
</html>
